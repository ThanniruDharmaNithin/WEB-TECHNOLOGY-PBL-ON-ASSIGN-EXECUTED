<!DOCTYPE html>
<html>
<head>
  <title>View Files</title>
 <style type="text/css">
        body{margin: 0;background-color: #eee}
        h1{font-family: Times New Roman;background-color: #2e87d4;color: #fff;text-align: center;padding: 20px;}
        div{margin: 200px auto;background-color: #fff;text-align: center;border: 1px solid #c3c3c3}
        a{padding: 20px;margin: 20px; border-radius: 3px; background-color: #66c35a;text-decoration: none;display: inline-block;color: #fff;}
        a:hover{background-color: #ce4cba;transition: all 0.3s}
    </style>
</head>
<body>
  <h1>Submitted Assignments</h1>
  
  <table>
    <tr>
      <th>Assignment Name</th>
      <th>Student Name</th>
      <th>Submission Date</th>
      <th>Download</th>
    </tr>
    
    <c:forEach var="assignment" items="${assignments}">
      <tr>
        <td>${assignment.name}</td>
        <td>${assignment.studentName}</td>
        <td>${assignment.submissionDate}</td>
        <td>
          <a href="/download-file?fileId=${assignment.fileId}">Download</a>
        </td>
      </tr>
    </c:forEach>
  </table>
</body>
</html>
